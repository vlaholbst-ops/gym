<title>Зал — День A / День B</title>
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0f0d">
<meta name="mobile-web-app-capable" content="yes">

<style>
  /* Палитра из самого зала: лаймовые и фиолетовые стены, чёрный резиновый пол. */
  :root {
    --bg: #0e0f0d;
    --card: #171a16;
    --card-2: #1f231d;
    --line: #2c3129;
    --ink: #eef1e9;
    --dim: #9aa394;
    --faint: #6b7365;

    --lime: #a8d13c;
    --violet: #b06fe0;
    --danger: #ff6b5e;
    --danger-bg: #2a1614;
    --good: #7ecb6e;

    --accent: var(--lime);
    --on-accent: #0e0f0d;

    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* Страница намеренно тёмная: телефон в руке, зал бликует. */
  :root[data-theme="light"] { color-scheme: dark; }
  [data-day="B"] { --accent: var(--violet); }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ui);
    font-size: 15px;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
    padding-bottom: 150px;
  }

  /* ---------- шапка ---------- */

  header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 93%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 8px 14px 0;
  }
  .bar1 { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  h1 { margin: 0; font-size: 14px; font-weight: 700; letter-spacing: .02em; }
  .date { font-family: var(--mono); font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }

  .switch { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
  .switch button {
    appearance: none; border: 1px solid var(--line); background: var(--card);
    color: var(--dim); font-family: var(--ui); font-size: 14px; font-weight: 650;
    padding: 9px; border-radius: 9px; cursor: pointer;
  }
  .switch button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #tabA[aria-pressed="true"] { background: var(--lime); border-color: var(--lime); color: #0e0f0d; font-weight: 750; }
  #tabB[aria-pressed="true"] { background: var(--violet); border-color: var(--violet); color: #0e0f0d; font-weight: 750; }

  .suggest { font-size: 11.5px; color: var(--faint); margin: 0 0 7px; }
  .suggest b { color: var(--accent); font-weight: 650; }

  .prog { height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
  .prog i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .25s ease; }

  /* ---------- список ---------- */

  main { padding: 12px 14px; max-width: 640px; margin: 0 auto; }

  details.warm {
    background: var(--card); border: 1px solid var(--line); border-radius: 11px;
    padding: 10px 12px; margin-bottom: 10px;
  }
  details.warm summary {
    cursor: pointer; font-weight: 650; font-size: 13.5px; list-style: none;
    display: flex; justify-content: space-between; align-items: center;
  }
  details.warm summary::-webkit-details-marker { display: none; }
  details.warm summary::after { content: "▾"; color: var(--faint); }
  details.warm[open] summary::after { content: "▴"; }
  details.warm ul { margin: 8px 0 0; padding-left: 17px; color: var(--dim); font-size: 13px; }

  /* ---------- карточка упражнения — компактная ---------- */

  .ex {
    background: var(--card); border: 1px solid var(--line); border-radius: 11px;
    padding: 11px 12px; margin-bottom: 9px;
    transition: border-color .2s, background .2s;
  }
  .ex.done { border-color: color-mix(in srgb, var(--good) 55%, transparent); background: #161b14; }
  .ex.done .name { color: var(--dim); }

  .head { display: flex; align-items: flex-start; gap: 10px; }

  .thumb {
    flex: none; width: 52px; height: 52px; padding: 0;
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    background: var(--card-2); cursor: zoom-in;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.none { display: grid; place-items: center; color: var(--faint); font-size: 17px; cursor: default; }

  .title { flex: 1; min-width: 0; }
  .num { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .name { font-size: 15.5px; font-weight: 700; line-height: 1.25; }

  .target {
    flex: none; font-family: var(--mono); font-size: 12px; color: var(--accent);
    background: var(--card-2); border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--line));
    border-radius: 6px; padding: 3px 7px; white-space: nowrap; font-variant-numeric: tabular-nums;
  }

  .warn {
    margin-top: 8px; background: var(--danger-bg);
    border: 1px solid color-mix(in srgb, var(--danger) 40%, transparent);
    border-radius: 7px; padding: 7px 9px; font-size: 12.5px; color: #ffd7d2;
  }
  .warn b { color: var(--danger); }

  .prev { margin: 8px 0 0; font-size: 12.5px; color: var(--dim); }
  .prev .k { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--faint); }
  .todo { margin: 3px 0 0; font-size: 12.5px; color: var(--accent); font-weight: 600; }

  details.tech { margin-top: 8px; }
  details.tech summary {
    cursor: pointer; list-style: none; font-size: 11px; color: var(--faint);
    font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase;
  }
  details.tech summary::-webkit-details-marker { display: none; }
  details.tech summary::after { content: " ▾"; }
  details.tech[open] summary::after { content: " ▴"; }
  details.tech ul { margin: 7px 0 0; padding-left: 16px; font-size: 13px; color: var(--dim); }
  details.tech li { margin-bottom: 3px; }
  details.tech b { color: var(--ink); font-weight: 650; }
  details.tech figure { margin: 8px 0 0; }
  details.tech svg { width: 100%; height: auto; border-radius: 7px; background: var(--card-2); }
  details.tech figcaption { font-size: 11.5px; color: var(--faint); margin-top: 5px; text-align: center; }
  .vid { display: inline-block; margin-top: 7px; font-size: 12.5px; color: var(--dim); }

  /* ---------- подходы ---------- */

  .sets { margin-top: 9px; display: flex; flex-direction: column; gap: 6px; }
  .set { display: grid; grid-template-columns: 16px 1fr 1fr 38px; align-items: center; gap: 6px; }
  .sn { font-family: var(--mono); font-size: 11px; color: var(--faint); }

  .step {
    display: grid; grid-template-columns: 30px 1fr 30px; align-items: stretch;
    background: var(--card-2); border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
  }
  .step button {
    appearance: none; border: 0; background: transparent; color: var(--dim);
    font-size: 17px; font-weight: 600; cursor: pointer; padding: 0; touch-action: manipulation;
  }
  .step button:active { background: var(--line); color: var(--ink); }
  .step input {
    border: 0; background: transparent; color: var(--ink); font-family: var(--mono);
    font-size: 14px; font-weight: 650; text-align: center; width: 100%; padding: 8px 0;
    font-variant-numeric: tabular-nums; -moz-appearance: textfield;
  }
  .step input::-webkit-outer-spin-button, .step input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .step input:focus { outline: none; }

  .ok {
    appearance: none; width: 38px; height: 36px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--card-2); color: var(--faint);
    font-size: 15px; cursor: pointer; display: grid; place-items: center; touch-action: manipulation;
  }
  .ok[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }

  .labels {
    display: grid; grid-template-columns: 16px 1fr 1fr 38px; gap: 6px;
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--faint); margin-top: 8px;
  }
  .labels span:nth-child(2), .labels span:nth-child(3) { text-align: center; }

  /* ---------- заметка и стоп-сигналы ---------- */

  textarea {
    width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    color: var(--ink); font-family: var(--ui); font-size: 13.5px; padding: 10px;
    resize: vertical; min-height: 68px; margin-top: 4px;
  }
  textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); }

  .stop {
    margin-top: 10px; font-size: 12.5px; color: var(--dim); background: var(--danger-bg);
    border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
    border-radius: 11px; padding: 10px 12px;
  }
  .stop b { color: var(--danger); }

  /* ---------- ОТДЫХ: полоса снизу, не поверх всего экрана ---------- */

  .rest {
    position: fixed; left: 0; right: 0; bottom: 62px; z-index: 30;
    background: var(--card); border-top: 1px solid var(--line);
    box-shadow: 0 -6px 22px rgba(0,0,0,.45);
    transform: translateY(140%); transition: transform .25s ease;
  }
  .rest.up { transform: translateY(0); }
  .rest-in {
    max-width: 640px; margin: 0 auto; display: flex; align-items: center; gap: 10px;
    padding: 9px 14px;
  }
  .clock {
    font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--accent);
    font-variant-numeric: tabular-nums; min-width: 68px;
  }
  .clock.over { color: var(--good); }
  .rest-lbl { flex: 1; font-size: 10px; color: var(--faint); font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; }
  .rest-lbl span { display: block; margin-top: 2px; font-family: var(--ui); font-size: 12.5px; text-transform: none; letter-spacing: 0; color: var(--ink); }
  .rest button {
    appearance: none; border: 1px solid var(--line); background: var(--card-2); color: var(--ink);
    font-family: var(--ui); font-size: 13px; font-weight: 600; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; touch-action: manipulation;
  }

  /* ---------- нижняя панель ---------- */

  #bar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
    padding: 9px 14px calc(9px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 94%, transparent);
    backdrop-filter: blur(12px); border-top: 1px solid var(--line);
    display: flex; gap: 8px;
  }
  #bar button {
    appearance: none; border: 1px solid var(--line); background: var(--card-2);
    color: var(--ink); font-family: var(--ui); font-size: 14px; font-weight: 600;
    padding: 10px; border-radius: 9px; cursor: pointer; touch-action: manipulation;
  }
  #copy { background: var(--accent); border-color: var(--accent); color: var(--on-accent); font-weight: 700; flex: 1; }
  #reset { flex: 0 0 84px; }

  /* ---------- зум фото ---------- */

  #zoom {
    position: fixed; inset: 0; z-index: 60; display: none; place-items: center;
    background: rgba(0,0,0,.9); padding: 16px;
  }
  #zoom.on { display: grid; }
  #zoom img { max-width: 100%; max-height: 85vh; border-radius: 10px; }
  #zoom p { color: var(--dim); font-size: 13px; text-align: center; margin: 10px 0 0; }

  #toast {
    position: fixed; left: 50%; bottom: 130px; transform: translate(-50%, 10px);
    background: var(--ink); color: var(--bg); font-size: 13.5px; font-weight: 650;
    padding: 9px 16px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 70;
  }
  #toast.on { opacity: 1; transform: translate(-50%, 0); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<header>
  <div class="bar1">
    <h1 id="dayTitle">День A</h1>
    <span class="date" id="today"></span>
  </div>
  <div class="switch">
    <button id="tabA" aria-pressed="true">День A</button>
    <button id="tabB" aria-pressed="false">День B</button>
  </div>
  <p class="suggest" id="suggest"></p>
  <div class="prog"><i id="progI"></i></div>
</header>

<main id="app"></main>

<div class="rest" id="rest" role="status" aria-live="polite">
  <div class="rest-in">
    <div class="clock" id="clock">1:30</div>
    <div class="rest-lbl">Отдых<span id="restNote">Подход засчитан</span></div>
    <button id="plus30">+30с</button>
    <button id="skipRest">Хватит</button>
  </div>
</div>

<div id="bar">
  <button id="reset">Сброс</button>
  <button id="copy">Скопировать тренировку</button>
</div>

<div id="zoom"><div><img id="zoomImg" alt=""><p id="zoomCap"></p></div></div>
<div id="toast"></div>

<script>
(function () {
  "use strict";

  var P = {
    p1: "{{PHOTO1}}", p3: "{{PHOTO3}}", p4: "{{PHOTO4}}",
    p5: "{{PHOTO5}}", p6: "{{PHOTO6}}", p7: "{{PHOTO7}}", p9: "{{PHOTO9}}"
  };

  var YT = "https://www.youtube.com/results?search_query=";

  var DIAG = {
    pallof:
      '<svg viewBox="0 0 320 150" role="img" aria-label="Схема pallof press">' +
      '<rect x="16" y="30" width="6" height="90" fill="#2c3129"/>' +
      '<circle cx="19" cy="70" r="4" fill="#a8d13c"/>' +
      '<line x1="19" y1="70" x2="150" y2="70" stroke="#a8d13c" stroke-width="2.5" stroke-dasharray="4 3"/>' +
      '<circle cx="170" cy="46" r="10" fill="none" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="170" y1="56" x2="170" y2="98" stroke="#eef1e9" stroke-width="2.5"/>' +
      '<line x1="170" y1="98" x2="158" y2="128" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="170" y1="98" x2="184" y2="128" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="170" y1="68" x2="150" y2="70" stroke="#eef1e9" stroke-width="2.5"/>' +
      '<path d="M186 70 L232 70" stroke="#a8d13c" stroke-width="2.5" marker-end="url(#ar2)"/>' +
      '<text x="196" y="60" fill="#a8d13c" font-size="10" font-family="monospace">выжимаешь</text>' +
      '<text x="196" y="88" fill="#a8d13c" font-size="10" font-family="monospace">и держишь</text>' +
      '<text x="98" y="142" fill="#ff6b5e" font-size="10" font-family="monospace">корпус НЕ поворачивать — в этом весь смысл</text>' +
      '<defs><marker id="ar2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 z" fill="#a8d13c"/></marker></defs>' +
      '</svg>',
    deadbug:
      '<svg viewBox="0 0 320 140" role="img" aria-label="Схема dead bug">' +
      '<line x1="20" y1="100" x2="300" y2="100" stroke="#2c3129" stroke-width="3"/>' +
      '<circle cx="70" cy="86" r="10" fill="none" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="80" y1="90" x2="200" y2="94" stroke="#eef1e9" stroke-width="3"/>' +
      '<line x1="96" y1="90" x2="96" y2="54" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="96" y1="54" x2="122" y2="46" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="190" y1="93" x2="190" y2="56" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="190" y1="56" x2="216" y2="66" stroke="#eef1e9" stroke-width="2"/>' +
      '<line x1="196" y1="94" x2="256" y2="88" stroke="#a8d13c" stroke-width="2.5"/>' +
      '<line x1="86" y1="90" x2="52" y2="58" stroke="#a8d13c" stroke-width="2.5"/>' +
      '<text x="96" y="126" fill="#a8d13c" font-size="10" font-family="monospace">поясница ПРИЖАТА к полу</text>' +
      '</svg>'
  };

  var WARMUP = {{WARMUP}};
  var DAYS = {{DAYS}};

  var app = document.getElementById("app");
  var toastEl = document.getElementById("toast");
  var restEl = document.getElementById("rest");
  var clockEl = document.getElementById("clock");
  var restNote = document.getElementById("restNote");

  var day = "A";
  var state = {};

  var today = new Date();
  var DOW = ["ВС", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
  var iso = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, "0") + "-" + String(today.getDate()).padStart(2, "0");
  document.getElementById("today").textContent = iso + " · " + DOW[today.getDay()];
  var KEY = "gym:" + iso;

  function load() {
    try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { state = {}; }
    if (!state.A) state.A = {};
    if (!state.B) state.B = {};
  }
  function save() { state.day = day; try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }

  function toast(m) {
    toastEl.textContent = m;
    toastEl.classList.add("on");
    setTimeout(function () { toastEl.classList.remove("on"); }, 1800);
  }

  /* ---------- отдых: полоса снизу ---------- */

  var tick = null, left = 0;
  function fmt(s) {
    var neg = s < 0, a = Math.abs(s);
    return (neg ? "+" : "") + Math.floor(a / 60) + ":" + String(a % 60).padStart(2, "0");
  }
  function startRest(sec) {
    left = sec;
    restEl.classList.add("up");
    restNote.textContent = "Подход засчитан";
    clockEl.classList.remove("over");
    clockEl.textContent = fmt(left);
    clearInterval(tick);
    tick = setInterval(function () {
      left--;
      clockEl.textContent = fmt(left);
      if (left === 0) {
        clockEl.classList.add("over");
        restNote.textContent = "Пора работать";
        if (navigator.vibrate) navigator.vibrate([200, 90, 200]);
      }
      if (left <= -60) stopRest();
    }, 1000);
  }
  function stopRest() { clearInterval(tick); tick = null; restEl.classList.remove("up"); }

  document.getElementById("skipRest").addEventListener("click", stopRest);
  document.getElementById("plus30").addEventListener("click", function () {
    left += 30;
    clockEl.textContent = fmt(left);
    if (left > 0) { clockEl.classList.remove("over"); restNote.textContent = "Подход засчитан"; }
  });

  /* ---------- зум фото ---------- */

  var zoomEl = document.getElementById("zoom");
  zoomEl.addEventListener("click", function () { zoomEl.classList.remove("on"); });
  function zoom(src, cap) {
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomCap").textContent = cap;
    zoomEl.classList.add("on");
  }

  /* ---------- отрисовка ---------- */

  function exState(ex) {
    var d = state[day];
    if (!d[ex.n]) {
      d[ex.n] = { sets: [] };
      for (var i = 0; i < ex.sets; i++) d[ex.n].sets.push({ w: ex.start, r: parseInt(ex.reps, 10) || 10, done: false });
    }
    return d[ex.n];
  }

  function render() {
    document.documentElement.setAttribute("data-day", day);
    document.getElementById("dayTitle").textContent = "День " + day;
    document.getElementById("tabA").setAttribute("aria-pressed", String(day === "A"));
    document.getElementById("tabB").setAttribute("aria-pressed", String(day === "B"));
    stopRest();
    app.innerHTML = "";

    var warm = document.createElement("details");
    warm.className = "warm";
    warm.innerHTML = "<summary>🔥 Разминка — 8 мин</summary><ul>" +
      WARMUP.map(function (w) { return "<li>" + w + "</li>"; }).join("") + "</ul>";
    app.appendChild(warm);

    DAYS[day].forEach(function (ex) {
      var st = exState(ex);
      var card = document.createElement("section");
      card.className = "ex";

      var h = '<div class="head">';
      h += ex.photo
        ? '<button class="thumb" type="button" data-zoom="' + ex.photo + '"><img src="' + P[ex.photo] + '" alt="" loading="lazy"></button>'
        : '<div class="thumb none">🏋️</div>';
      h += '<div class="title"><div class="num">' + ex.n + '</div><div class="name">' + ex.name + '</div></div>';
      h += '<div class="target">' + ex.sets + " × " + ex.reps + "</div></div>";

      if (ex.warn) h += '<div class="warn"><b>Внимание.</b> ' + ex.warn + "</div>";

      h += '<p class="prev"><span class="k">Прошлый раз</span>' + ex.last + "</p>";
      h += '<p class="todo">→ ' + ex.next + "</p>";

      h += '<details class="tech"><summary>техника</summary>';
      h += "<ul>" + ex.cues.map(function (c) { return "<li>" + c + "</li>"; }).join("") + "</ul>";
      if (ex.diagram) h += "<figure>" + DIAG[ex.diagram] + "<figcaption>" + (ex.diagramCap || "") + "</figcaption></figure>";
      h += '<a class="vid" target="_blank" rel="noopener" href="' + YT + ex.video + '">🎥 видео</a></details>';

      h += '<div class="labels"><span></span><span>вес, кг</span><span>повторы</span><span></span></div><div class="sets">';
      st.sets.forEach(function (s, i) {
        h += '<div class="set" data-set="' + i + '">' +
          '<span class="sn">' + (i + 1) + "</span>" +
          '<div class="step"><button data-act="w-">−</button><input type="number" inputmode="decimal" step="0.5" data-f="w" value="' + s.w + '"><button data-act="w+">+</button></div>' +
          '<div class="step"><button data-act="r-">−</button><input type="number" inputmode="numeric" data-f="r" value="' + s.r + '"><button data-act="r+">+</button></div>' +
          '<button class="ok" data-act="done" aria-pressed="' + s.done + '" aria-label="Подход выполнен">✓</button></div>';
      });
      h += "</div>";
      card.innerHTML = h;

      card.addEventListener("click", function (e) {
        var z = e.target.closest("[data-zoom]");
        if (z) { zoom(P[z.getAttribute("data-zoom")], ex.name); return; }

        var b = e.target.closest("[data-act]");
        if (!b) return;
        var row = b.closest(".set");
        if (!row) return;
        var i = +row.getAttribute("data-set");
        var s = st.sets[i];
        var act = b.getAttribute("data-act");

        if (act === "done") {
          s.done = !s.done;
          b.setAttribute("aria-pressed", String(s.done));
          if (s.done) startRest(ex.rest);
        } else {
          if (act === "w+") s.w = Math.round((s.w + 2.5) * 10) / 10;
          if (act === "w-") s.w = Math.max(0, Math.round((s.w - 2.5) * 10) / 10);
          if (act === "r+") s.r += 1;
          if (act === "r-") s.r = Math.max(0, s.r - 1);
          row.querySelector('[data-f="w"]').value = s.w;
          row.querySelector('[data-f="r"]').value = s.r;
        }
        save();
        paint();
      });

      card.addEventListener("input", function (e) {
        var inp = e.target.closest("[data-f]");
        if (!inp) return;
        var row = inp.closest(".set");
        st.sets[+row.getAttribute("data-set")][inp.getAttribute("data-f")] = parseFloat(inp.value) || 0;
        save();
      });

      app.appendChild(card);
    });

    var nw = document.createElement("div");
    nw.innerHTML = '<div class="lbl">Как прошло: боль, ощущения</div><textarea id="note" placeholder="Плечо не беспокоило. Жим ногами 62 — легко."></textarea>';
    app.appendChild(nw);
    var nt = nw.querySelector("textarea");
    nt.value = state[day].note || "";
    nt.addEventListener("input", function () { state[day].note = nt.value; save(); });

    var stop = document.createElement("div");
    stop.className = "stop";
    stop.innerHTML = "<b>Стоп-сигналы.</b> Острая боль в пояснице или ощущение, что плечо «идёт из сустава» — " +
      "сразу стоп, снизь вес или амплитуду. Жжение в мышце — норма. Боль в суставе или спине — нет.";
    app.appendChild(stop);

    paint();
  }

  function paint() {
    var total = 0, done = 0;
    var cards = app.querySelectorAll(".ex");
    DAYS[day].forEach(function (ex, idx) {
      var st = state[day][ex.n];
      if (!st) return;
      st.sets.forEach(function (s) { total++; if (s.done) done++; });
      if (cards[idx]) cards[idx].classList.toggle("done", st.sets.every(function (s) { return s.done; }));
    });
    document.getElementById("progI").style.width = (total ? (done / total) * 100 : 0) + "%";
  }

  /* ---------- экспорт ---------- */

  function buildText() {
    var out = ["Тренировка " + iso + " — День " + day, ""];
    DAYS[day].forEach(function (ex) {
      var st = state[day][ex.n];
      if (!st) return;
      var done = st.sets.filter(function (s) { return s.done; });
      if (!done.length) return;
      out.push(ex.n + ". " + ex.name + " — " + done.map(function (s) { return s.w + "кг×" + s.r; }).join(", "));
    });
    var skipped = DAYS[day].filter(function (ex) {
      var st = state[day][ex.n];
      return !st || !st.sets.some(function (s) { return s.done; });
    });
    if (skipped.length) out.push("", "Не сделано: " + skipped.map(function (e) { return e.name; }).join(", "));
    if (state[day].note) out.push("", "Заметка: " + state[day].note);
    return out.join("\n");
  }

  document.getElementById("copy").addEventListener("click", function () {
    var t = buildText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(function () { toast("Скопировано — отправь Claude"); }, function () { fallback(t); });
    } else fallback(t);
  });
  function fallback(t) {
    var ta = document.createElement("textarea");
    ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); toast("Скопировано — отправь Claude"); }
    catch (e) { toast("Не вышло — выдели вручную"); }
    document.body.removeChild(ta);
  }

  document.getElementById("reset").addEventListener("click", function () {
    if (!confirm("Стереть веса и отметки за сегодня?")) return;
    state[day] = {}; save(); render(); toast("Сброшено");
  });

  document.getElementById("tabA").addEventListener("click", function () { day = "A"; save(); render(); });
  document.getElementById("tabB").addEventListener("click", function () { day = "B"; save(); render(); });

  /* Чередование A-B-A / B-A-B от старта программы (ПН 06.07.2026). Зал: ПН / СР / ПТ. */
  function scheduled() {
    var wk = Math.floor((today - new Date(2026, 6, 6)) / 604800000);
    var order = wk % 2 === 0 ? ["A", "B", "A"] : ["B", "A", "B"];
    var slot = { 1: 0, 3: 1, 5: 2 }[today.getDay()];
    return slot === undefined ? null : order[slot];
  }

  load();
  var plan = scheduled();
  var sg = document.getElementById("suggest");
  if (state.day) day = state.day;
  else if (plan) day = plan;

  sg.innerHTML = plan
    ? "По расписанию сегодня <b>День " + plan + "</b>."
    : "Сегодня не тренировочный день — зал по <b>ПН / СР / ПТ</b>.";

  render();
})();
</script>
